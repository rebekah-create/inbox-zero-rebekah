# nginx site config for inbox.tdfurn.com -- Cloudflare target state.
# Install to /etc/nginx/sites-available/inbox (symlinked from sites-enabled).
# See deploy/nginx/README.md for the SSM-driven install procedure.
#
# Differences from the pre-Cloudflare config:
#   1. Real client IPs restored from CF-Connecting-IP (Cloudflare proxies all
#      traffic once inbox.tdfurn.com is orange-clouded).
#   2. access_log uses a "redacted" format that scrubs token=... and code=...
#      query values before lines ship to CloudWatch Logs.
#   3. TLS switches from Let's Encrypt to the Cloudflare Origin CA cert
#      (fetched from SSM /inbox-zero-tls/*). Old certbot paths kept below,
#      commented out, for rollback.
#
# This file lives at http-context include level (sites-enabled/* is included
# inside the http block), so map / log_format / set_real_ip_from are valid here.

# ---------------------------------------------------------------------------
# Restore real client IPs. Cloudflare edge ranges, hardcoded from
# https://www.cloudflare.com/ips-v4 and /ips-v6 as of 2026-06-12.
# REFRESH NOTE: these change rarely (order of years). When they do, update
# this list AND let `tofu plan` refresh the AWS prefix lists in
# deploy/terraform/network.tf (quarterly tripwire in CLOUDFLARE-CUTOVER.md).
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ---------------------------------------------------------------------------
# Secret redaction for access logs. Feedback/unsubscribe-style links carry
# ?token=... values, and Better Auth OAuth callbacks carry ?code=... (e.g.
# /api/auth/callback/google?code=...&state=...); neither must land in
# CloudWatch. The map rewrites "token=<value>" / "code=<value>" to
# "...=REDACTED" in the logged request line only -- the upstream still
# receives the real query string.
#
# Note: the map applies the regex once, so only one matching occurrence per
# line is redacted. Acceptable here -- these URLs carry at most one such
# param per request.
#
# The redacted log_format below is byte-for-byte `combined` except $request
# is replaced by $request_redacted. The CloudWatch metric filters in
# deploy/terraform/observability.tf parse this exact 9-field structure --
# do not add/remove/reorder fields without updating those patterns.
# ---------------------------------------------------------------------------
map $request $request_redacted {
    ~*^(?<rr_before>.*[?&](?:token|code)=)[^&\s]*(?<rr_after>.*)$ "${rr_before}REDACTED${rr_after}";
    default $request;
}

log_format redacted '$remote_addr - $remote_user [$time_local] '
                    '"$request_redacted" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

# ---------------------------------------------------------------------------
# Port 80: ACME webroot + redirect to HTTPS.
# After Stage 5 (origin lockdown) the security group no longer admits port 80
# at all, so this block is unreachable -- kept intentionally so a rollback to
# Let's Encrypt (re-open port 80, re-run certbot) needs no nginx changes.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name inbox.tdfurn.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Port 443: TLS termination + reverse proxy to the app container.
# ---------------------------------------------------------------------------
server {
    # Legacy "listen ... http2" syntax on purpose: the box runs Ubuntu 22.04 /
    # nginx 1.18, which predates the standalone "http2 on;" directive (1.25.1+).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inbox.tdfurn.com;

    # Cloudflare Origin CA certificate (valid ~15 years, trusted only by the
    # Cloudflare edge -- which is the only thing allowed to connect post-
    # lockdown). Installed from SSM per deploy/nginx/README.md.
    ssl_certificate     /etc/ssl/cloudflare/inbox.tdfurn.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/inbox.tdfurn.com.key;

    # --- ROLLBACK: previous Let's Encrypt cert (certbot-managed) ---
    # Swap the two lines above for these, re-open port 80 in the SG
    # (lock_origin_to_cloudflare = false), and re-enable the certbot timer.
    # ssl_certificate     /etc/letsencrypt/live/inbox.tdfurn.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/inbox.tdfurn.com/privkey.pem;
    # ----------------------------------------------------------------

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/access.log redacted;
    error_log  /var/log/nginx/error.log;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running AI/SSE requests
        proxy_read_timeout 300s;
    }
}
